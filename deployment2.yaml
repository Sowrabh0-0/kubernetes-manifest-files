apiVersion: apps/v1
kind: Deployment
metadata:
  name: sowrabh-flipkart-deployment
  namespace: sowrabh-ns
  labels:
    app: sowrabh-flipkart-dp 
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: flipkart-web
  template:
    metadata:
      labels:
        app: flipkart-web
    spec:
      containers:
        - name: flipkart-container
          image: muralisocial123/flipkart-app-web:v1.1.0
          ports:
            - containerPort: 80