apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: ey-cart-rs
  namespace: sowrabh-ns
  labels:
    app: cart
spec: # here it defines the behaviour of the replicaset
  replicas: 3
  selector:
    matchLabels:
      app: webapp
  template: # it contains pod definition
    metadata:
      labels:
        app: webapp
    spec: # here it defines the container definition
      containers:
        - name: ey-cart-container
          image: muralisocial123/ey-cart:v1.1.0
          ports:
            - containerPort: 3000

        