apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: flipkart-rs
  namespace: sowrabh-ns
  labels:
    app: flipkart
spec:
  replicas: 3
  selector:
    matchLabels: 
      app: flipkart-web-app
  template:
    metadata:
      labels: 
        app: flipkart-web-app
    spec:
      containers:
        - name: flipkart-container
          image: muralisocial123/flipkart-app-web:v1.1.0
          ports:
            - containerPort: 80